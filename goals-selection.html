<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Your Goals | Link to Light</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #F5F5F5;
      color: #333;
    }
    .goals-container {
      max-width: 600px;
      margin: 30px auto;
      padding: 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .goals-title {
      color: #4A90E2;
      text-align: center;
      margin-bottom: 10px;
    }
    .goals-subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    .goal-card {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .goal-card:hover {
      background: #E3F2FD;
    }
    .goal-card.selected {
      border-color: #4A90E2;
      background: #E3F2FD;
    }
    .goal-card input {
      display: none;
    }
    .btn-next {
      background-color: #4A90E2;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: 600;
      display: block;
      margin: 40px auto 0;
      width: 200px;
      text-align: center;
    }
    .btn-next:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="goals-container">
      <h1 class="goals-title">What do you hope to achieve?</h1>
      <p class="goals-subtitle">Select 1 or more goals from the list</p>
      
      <form id="goalsForm">
        <label class="goal-card">
          <input type="checkbox" name="goals" value="learn_about_autism">
          <strong>Learn More About Autism</strong>
        </label>
        
        <label class="goal-card">
          <input type="checkbox" name="goals" value="help_child_directly">
          <strong>Able To Help My Child Directly</strong>
        </label>
        
        <label class="goal-card">
          <input type="checkbox" name="goals" value="download_resources">
          <strong>Download Resources - Home Use</strong>
        </label>
        
        <label class="goal-card">
          <input type="checkbox" name="goals" value="understand_students">
          <strong>Understand My Students</strong>
        </label>
        
        <label class="goal-card">
          <input type="checkbox" name="goals" value="access_therapy">
          <strong>Access Therapy Sessions</strong>
        </label>
        
        <label class="goal-card">
          <input type="checkbox" name="goals" value="share_with_carers">
          <strong>Access Resources To Share With Carers</strong>
        </label>
        
        <label class="goal-card">
          <input type="checkbox" name="goals" value="just_curious">
          <strong>Just Curious To Try Something New</strong>
        </label>
        
        <button type="submit" class="btn btn-next" id="submitButton" disabled>Next</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('goalsForm');
    const submitButton = document.getElementById('submitButton');
    
    // Update selection styling
    document.querySelectorAll('.goal-card input').forEach(checkbox => {
      checkbox.addEventListener('change', function() {
        this.closest('.goal-card').classList.toggle('selected', this.checked);
        validateForm();
      });
    });
    
    // Validate at least one selection
    function validateForm() {
      const checked = document.querySelectorAll('input[name="goals"]:checked').length > 0;
      submitButton.disabled = !checked;
    }
    
    // Form submission
    // In goals-selection.html (inside the form submit event handler)
form.addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const selectedGoals = Array.from(document.querySelectorAll('input[name="goals"]:checked'))
    .map(el => el.value);

  try {
    // 1. Save to backend
    const response = await fetch('/api/save-goals', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: localStorage.getItem('userId'),
        goals: selectedGoals
      })
    });

    if (!response.ok) throw new Error('Failed to save goals');

    // 2. Save to localStorage as fallback
    localStorage.setItem('userGoals', JSON.stringify(selectedGoals));
    
    // 3. Redirect to dashboard
    window.location.href = "dashboard.html";

  } catch (error) {
    console.error("Error saving goals:", error);
    // Fallback: Save to localStorage only
    localStorage.setItem('userGoals', JSON.stringify(selectedGoals));
    window.location.href = "dashboard.html";
  }
});
    
    // Initial validation
    validateForm();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
