<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Link to Light</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #F5F5F5;
    }
    .signup-container {
      max-width: 600px;
      margin: 50px auto;
      padding: 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .form-title {
      color: #e1e6eb;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-label {
      font-weight: 600;
      color: #333;
    }
    .form-control {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }
    .form-control:focus {
      border-color: #4A90E2;
      box-shadow: 0 0 0 0.25rem rgba(74, 144, 226, 0.25);
    }
    .invalid-feedback {
      color: #dc3545;
      font-size: 0.9em;
    }
    .btn-container {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }
    .btn {
      padding: 10px 25px;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn-next {
      background-color: #4A90E2;
      color: white;
      border: none;
    }
    .btn-next:hover {
      background-color: #3a7bc8;
    }
    .btn-back {
      background-color: #e9ecef;
      color: #6c757d;
      border: none;
      cursor: not-allowed;
    }
    .progress-bar {
      height: 5px;
      background-color: #e9ecef;
      margin-bottom: 30px;
      border-radius: 5px;
    }
    .progress {
      height: 100%;
      width: 33%;
      background-color: #4A90E2;
      border-radius: 5px;
    }
    .password-wrapper {
      position: relative;
    }
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 42px;
      cursor: pointer;
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="signup-container">
      <h2 class="form-title">Create Your Account</h2>
      
      <div class="progress-bar">
        <div class="progress"></div>
      </div>
      
      <form id="signupForm">
        <!-- Parent Name -->
        <div class="mb-3">
          <label for="parentName" class="form-label">Parent/Guardian Name</label>
          <input type="text" class="form-control" id="parentName" required>
        </div>
        
        <!-- Email -->
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" pattern="[a-zA-Z0-9._%+-]+@gmail\.com$" required>
          <div class="invalid-feedback">Please enter a valid Gmail address (e.g., example@gmail.com)</div>
        </div>
        
        <!-- Phone Number -->
        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone" pattern="[0-9]{10}" required>
          <div class="invalid-feedback">Please enter a 10-digit phone number</div>
        </div>
        
        <!-- Password -->
        <div class="mb-3 password-wrapper">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$" required>
          <i class="toggle-password fas fa-eye" onclick="togglePassword('password')"></i>
          <div class="invalid-feedback">Password must be at least 8 characters with letters and numbers</div>
        </div>
        
        <!-- Confirm Password -->
        <div class="mb-3 password-wrapper">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword" required>
          <i class="toggle-password fas fa-eye" onclick="togglePassword('confirmPassword')"></i>
          <div class="invalid-feedback">Passwords do not match</div>
        </div>
        
        <div class="btn-container">
          <button type="button" class="btn btn-back" disabled>Back</button>
          <button type="submit" class="btn btn-next">Next</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Toggle Password Visibility
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = field.nextElementSibling;
      if (field.type === "password") {
        field.type = "text";
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        field.type = "password";
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // Form Validation
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Validate password match
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        document.getElementById('confirmPassword').classList.add('is-invalid');
        return;
      } else {
        document.getElementById('confirmPassword').classList.remove('is-invalid');
      }
      
      // If all valid, proceed to next page
      window.location.href = "therapist-info.html";
    });

    // Real-time validation
    document.getElementById('email').addEventListener('input', function() {
      this.classList.toggle('is-invalid', !this.checkValidity());
    });
    
    document.getElementById('phone').addEventListener('input', function() {
      this.classList.toggle('is-invalid', !this.checkValidity());
    });
    
    document.getElementById('password').addEventListener('input', function() {
      this.classList.toggle('is-invalid', !this.checkValidity());
    });
    
    document.getElementById('confirmPassword').addEventListener('input', function() {
      const password = document.getElementById('password').value;
      this.classList.toggle('is-invalid', this.value !== password);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
