
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Child Assessment | Link to Light</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #F5F5F5;
      color: #333;
    }
    .assessment-container {
      max-width: 600px;
      margin: 30px auto;
      padding: 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .assessment-title {
      color: #4A90E2;
      text-align: center;
      margin-bottom: 10px;
    }
    .assessment-subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 5px;
    }
    .child-name-header {
      text-align: center;
      color: #4A90E2;
      font-weight: 600;
      margin-bottom: 25px;
      font-size: 1.2rem;
    }
    .category {
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      padding-bottom: 20px;
    }
    .category:last-child {
      border-bottom: none;
    }
    .category-title {
      color: #4A90E2;
      font-size: 1.3rem;
      margin-bottom: 15px;
    }
    .option-card {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .option-card:hover {
      background: #E3F2FD;
    }
    .option-card.selected {
      border-color: #4A90E2;
      background: #E3F2FD;
    }
    .option-card input {
      display: none;
    }
    .btn-container {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .btn {
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: 600;
      text-align: center;
      flex: 1;
      min-width: 200px;
    }
    .btn-next {
      background-color: #4A90E2;
      color: white;
      border: none;
    }
    .btn-next:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .btn-save {
      background-color: white;
      color: #4A90E2;
      border: 2px solid #4A90E2;
    }
    .save-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .save-modal.active {
      opacity: 1;
      pointer-events: all;
    }
    .save-modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }
    .save-modal h3 {
      color: #4A90E2;
      margin-bottom: 20px;
    }
    .save-modal p {
      margin-bottom: 25px;
    }
    .save-modal-close {
      background: #4A90E2;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="assessment-container">
      <h1 class="assessment-title">Help us learn more...</h1>
      <p class="assessment-subtitle">Select one from each category</p>
      <div class="child-name-header" id="childNameHeader"></div>
      
      <form id="assessmentForm">
        <!-- Speech Category -->
        <div class="category">
          <h3 class="category-title">Speech</h3>
          
          <label class="option-card">
            <input type="radio" name="speech" value="aac_device" required>
            <strong>Uses AAC device</strong>
            <p>1-7 words</p>
          </label>
          
          <label class="option-card">
            <input type="radio" name="speech" value="non_speaking_asl">
            <strong>Non-Speaking</strong>
            <p>Uses ASL</p>
          </label>
          
          <label class="option-card">
            <input type="radio" name="speech" value="speaks_fluently">
            <strong>Speaks Fluently</strong>
          </label>
        </div>
        
        <!-- Bathroom Habits Category -->
        <div class="category">
          <h3 class="category-title">Bathroom Habits</h3>
          
          <label class="option-card">
            <input type="radio" name="bathroom" value="toilet_trained" required>
            <strong>Toilet Trained</strong>
          </label>
          
          <label class="option-card">
            <input type="radio" name="bathroom" value="non_toilet_trained">
            <strong>Non-Toilet Trained</strong>
          </label>
        </div>
        
        <!-- School Category -->
        <div class="category">
          <h3 class="category-title">School</h3>
          
          <label class="option-card">
            <input type="radio" name="school" value="regular_school" required>
            <strong>Goes to Regular School</strong>
          </label>
          
          <label class="option-card">
            <input type="radio" name="school" value="home_schooled">
            <strong>Home-Schooled</strong>
          </label>
          
          <label class="option-card">
            <input type="radio" name="school" value="special_school">
            <strong>Special/Charter School</strong>
          </label>
          
          <label class="option-card">
            <input type="radio" name="school" value="not_school_ready">
            <strong>Not School-Ready</strong>
          </label>
        </div>
        
        <div class="btn-container">
          <button type="button" class="btn btn-save" id="saveButton">Save and Continue Later</button>
          <button type="submit" class="btn btn-next" id="submitButton" disabled>Complete Assessment</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Save Modal -->
  <div class="save-modal" id="saveModal">
    <div class="save-modal-content">
      <h3>Your Progress Has Been Saved!</h3>
      <p>We've saved your current selections. You can return anytime to complete the assessment.</p>
      <p>We'll send a reminder to your email in 2 days if you don't complete it.</p>
      <button class="save-modal-close" id="closeModal">Return to Home</button>
    </div>
  </div>

  <script>
    // Load child's name from registration data
    function loadChildName() {
      const registrationData = localStorage.getItem('registrationData');
      if (registrationData) {
        const { child } = JSON.parse(registrationData);
        document.getElementById('childNameHeader').textContent = `Child: ${child.name}`;
      }
    }

    // Form validation
    const form = document.getElementById('assessmentForm');
    const submitButton = document.getElementById('submitButton');
    const saveButton = document.getElementById('saveButton');
    const saveModal = document.getElementById('saveModal');
    const closeModal = document.getElementById('closeModal');
    const radioGroups = ['speech', 'bathroom', 'school'];
    
    // Load saved progress if exists
    function loadProgress() {
      const savedData = localStorage.getItem('childAssessmentProgress');
      if (savedData) {
        const data = JSON.parse(savedData);
        radioGroups.forEach(group => {
          if (data[group]) {
            document.querySelector(`input[name="${group}"][value="${data[group]}"]`).checked = true;
            document.querySelector(`input[name="${group}"][value="${data[group]}"]`).closest('.option-card').classList.add('selected');
          }
        });
        validateForm();
      }
    }
    
    // Check if all categories have a selection
    function validateForm() {
      const isValid = radioGroups.every(group => {
        return document.querySelector(`input[name="${group}"]:checked`) !== null;
      });
      submitButton.disabled = !isValid;
    }
    
    // Add event listeners to all radio buttons
    document.querySelectorAll('.option-card input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', function() {
        // Update card styling
        document.querySelectorAll(`.option-card`).forEach(card => {
          card.classList.remove('selected');
        });
        document.querySelectorAll(`input[name="${this.name}"]:checked`).forEach(checked => {
          checked.closest('.option-card').classList.add('selected');
        });
        
        validateForm();
      });
    });
    
    // Form submission - redirects to home page
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const assessmentData = {
        speech: document.querySelector('input[name="speech"]:checked').value,
        bathroom: document.querySelector('input[name="bathroom"]:checked').value,
        school: document.querySelector('input[name="school"]:checked').value,
        completed: true,
        completedDate: new Date().toISOString()
      };

      // Save assessment data
      localStorage.setItem('assessmentData', JSON.stringify(assessmentData));
      
      // Redirect to home page
      window.location.href = "home.html";
    });
    
    // Save progress function
    function saveAssessment(data) {
      localStorage.setItem('childAssessmentProgress', JSON.stringify(data));
    }
    
    // Save progress handler
    saveButton.addEventListener('click', function() {
      const assessmentData = {};
      let hasSelections = false;
      
      radioGroups.forEach(group => {
        const selected = document.querySelector(`input[name="${group}"]:checked`);
        if (selected) {
          assessmentData[group] = selected.value;
          hasSelections = true;
        }
      });
      
      if (hasSelections) {
        assessmentData.completed = false;
        saveAssessment(assessmentData);
        
        // Show modal
        saveModal.classList.add('active');
      } else {
        alert('Please make at least one selection before saving.');
      }
    });
    
    // Close modal and return to home
    closeModal.addEventListener('click', function() {
      saveModal.classList.remove('active');
      window.location.href = "home.html";
    });
    
    // Initial load
    loadChildName();
    loadProgress();
    validateForm();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
