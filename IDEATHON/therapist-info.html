<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Therapist Info | Link to Light</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #F5F5F5;
    }
    .signup-container {
      max-width: 600px;
      margin: 50px auto;
      padding: 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .form-title {
      color: #4A90E2;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-label {
      font-weight: 600;
      color: #333;
    }
    .form-control {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }
    .form-control:focus {
      border-color: #4A90E2;
      box-shadow: 0 0 0 0.25rem rgba(74, 144, 226, 0.25);
    }
    .invalid-feedback {
      color: #dc3545;
      font-size: 0.9em;
    }
    .btn-container {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }
    .btn {
      padding: 10px 25px;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn-next {
      background-color: #4A90E2;
      color: white;
      border: none;
    }
    .btn-back {
      background-color: #e9ecef;
      color: #333;
      border: none;
    }
    .progress-bar {
      height: 5px;
      background-color: #e9ecef;
      margin-bottom: 30px;
      border-radius: 5px;
    }
    .progress {
      height: 100%;
      width: 66%;
      background-color: #4A90E2;
      border-radius: 5px;
    }
    .role-selector {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }
    .role-option {
      flex: 1;
      text-align: center;
      padding: 15px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .role-option:hover {
      border-color: #4A90E2;
    }
    .role-option.active {
      border-color: #4A90E2;
      background-color: #E3F2FD;
    }
    .role-option input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="signup-container">
      <h2 class="form-title">Therapist/Teacher Information</h2>
      
      <div class="progress-bar">
        <div class="progress"></div>
      </div>
      
      <form id="therapistForm">
        <!-- Role Selection -->
        <div class="role-selector">
          <label class="role-option active" onclick="selectRole(this)">
            <input type="radio" name="role" value="therapist" checked>
            <i class="fas fa-user-md" style="font-size: 24px; color: #4A90E2; margin-bottom: 10px;"></i>
            <div>Therapist</div>
          </label>
          <label class="role-option" onclick="selectRole(this)">
            <input type="radio" name="role" value="teacher">
            <i class="fas fa-chalkboard-teacher" style="font-size: 24px; color: #4A90E2; margin-bottom: 10px;"></i>
            <div>Teacher</div>
          </label>
        </div>
        
        <!-- Professional Information -->
        <div class="mb-3">
          <label for="professionalName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="professionalName" required>
        </div>
        
        <div class="mb-3">
          <label for="organization" class="form-label">Organization/School</label>
          <input type="text" class="form-control" id="organization" required>
        </div>
        
        <div class="mb-3">
          <label for="professionalEmail" class="form-label">Professional Email</label>
          <input type="email" class="form-control" id="professionalEmail" pattern="[a-zA-Z0-9._%+-]+@gmail\.com$" required>
          <div class="invalid-feedback">Please enter a valid Gmail address (e.g., example@gmail.com)</div>
        </div>
        
        <div class="btn-container">
          <button type="button" class="btn btn-back" onclick="window.history.back()">Back</button>
          <button type="submit" class="btn btn-next">Next</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Role Selection
    function selectRole(element) {
      document.querySelectorAll('.role-option').forEach(opt => {
        opt.classList.remove('active');
      });
      element.classList.add('active');
      element.querySelector('input').checked = true;
    }

    // Email Validation
    document.getElementById('professionalEmail').addEventListener('input', function() {
      this.classList.toggle('is-invalid', !this.checkValidity());
    });

    // Form Submission
    document.getElementById('therapistForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Validate form
      if (!this.checkValidity()) {
        this.classList.add('was-validated');
        return;
      }
      
      // If valid, proceed to next page
      window.location.href = "child-info.html"; // Next step
    });
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
