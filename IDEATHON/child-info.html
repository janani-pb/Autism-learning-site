<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Child Details | Link to Light</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #F5F5F5;
    }
    .signup-container {
      max-width: 600px;
      margin: 50px auto;
      padding: 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .form-title {
      color: #4A90E2;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-label {
      font-weight: 600;
      color: #333;
    }
    .form-control {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }
    .form-control:focus {
      border-color: #4A90E2;
      box-shadow: 0 0 0 0.25rem rgba(74, 144, 226, 0.25);
    }
    .btn-container {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }
    .btn {
      padding: 10px 25px;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn-next {
      background-color: #4A90E2;
      color: white;
      border: none;
    }
    .btn-next:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .btn-back {
      background-color: #e9ecef;
      color: #333;
      border: none;
    }
    .progress-bar {
      height: 5px;
      background-color: #e9ecef;
      margin-bottom: 30px;
      border-radius: 5px;
    }
    .progress {
      height: 100%;
      width: 100%;
      background-color: #4A90E2;
      border-radius: 5px;
    }
    .color-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .color-option {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    .color-option:hover {
      transform: scale(1.1);
    }
    .color-option.selected {
      border: 2px solid #333;
      box-shadow: 0 0 0 2px #4A90E2;
    }
    .age-selector {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .age-selector input {
      width: 80px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="signup-container">
      <h2 class="form-title">Child Information</h2>
      
      <div class="progress-bar">
        <div class="progress"></div>
      </div>
      
      <form id="childForm">
        <!-- Child Name -->
        <div class="mb-3">
          <label for="childName" class="form-label">Child's Name</label>
          <input type="text" class="form-control" id="childName" required>
        </div>
        
        <!-- Age -->
        <div class="mb-3">
          <label class="form-label">Age</label>
          <div class="age-selector">
            <input type="number" class="form-control" id="childAge" min="3" max="18" required>
            <span>years old</span>
          </div>
        </div>
        
        <!-- Color Sensitivity -->
        <div class="mb-3">
          <label class="form-label">Color Sensitivity Preferences</label>
          <p class="text-muted">Select colors that are comfortable for the child</p>
          
          <div class="color-options">
            <div class="color-option selected" style="background-color: #4A90E2;" data-color="blue" onclick="selectColor(this)"></div>
            <div class="color-option" style="background-color: #FFA07A;" data-color="peach" onclick="selectColor(this)"></div>
            <div class="color-option" style="background-color: #8BC34A;" data-color="green" onclick="selectColor(this)"></div>
            <div class="color-option" style="background-color: #FFC107;" data-color="yellow" onclick="selectColor(this)"></div>
            <div class="color-option" style="background-color: #9C27B0;" data-color="purple" onclick="selectColor(this)"></div>
            <div class="color-option" style="background-color: #E91E63;" data-color="pink" onclick="selectColor(this)"></div>
            <div class="color-option" style="background-color: #607D8B;" data-color="gray" onclick="selectColor(this)"></div>
            <div class="color-option" style="background-color: #795548;" data-color="brown" onclick="selectColor(this)"></div>
          </div>
          <input type="hidden" id="selectedColor" name="colorPreference" value="blue">
        </div>
        
        <div class="btn-container">
          <button type="button" class="btn btn-back" onclick="window.history.back()">Back</button>
          <button type="submit" class="btn btn-next" id="nextButton" disabled>Complete Registration</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Color Selection
    function selectColor(element) {
      document.querySelectorAll('.color-option').forEach(opt => {
        opt.classList.remove('selected');
      });
      element.classList.add('selected');
      document.getElementById('selectedColor').value = element.dataset.color;
    }

    // Form Validation
    const form = document.getElementById('childForm');
    const inputs = form.querySelectorAll('input[required]');
    const nextButton = document.getElementById('nextButton');
    
    function checkForm() {
      let isValid = true;
      inputs.forEach(input => {
        if (!input.value.trim()) {
          isValid = false;
        }
      });
      nextButton.disabled = !isValid;
    }
    
    // Real-time validation
    inputs.forEach(input => {
      input.addEventListener('input', checkForm);
    });
    
    // Age validation
    document.getElementById('childAge').addEventListener('change', function() {
      if (this.value < 3) this.value = 3;
      if (this.value > 18) this.value = 18;
      checkForm();
    });

    // Replace the form submission handler in child-details.html
document.getElementById('childForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  // Collect all data
  const registrationData = {
    parent: {
      name: localStorage.getItem('parentName'),
      email: localStorage.getItem('parentEmail'),
      phone: localStorage.getItem('parentPhone')
    },
    child: {
      name: document.getElementById('childName').value,
      age: document.getElementById('childAge').value,
      colorPreference: document.getElementById('selectedColor').value
    }
  };

  // Save to localStorage (or sessionStorage for better security)
  localStorage.setItem('registrationData', JSON.stringify(registrationData));
  
  // Redirect to assessment page
  window.location.href = "assessment.html";
});
    
    // Initial check
    checkForm();
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
